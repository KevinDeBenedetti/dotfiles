services:
  # Run Bats unit tests
  test-bats:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
      target: test-bats

  # Validate init.sh flag parsing
  test-init:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
      target: test-init

  # Test dotfile linking on a clean Debian system
  test-dotfiles:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
      target: test-dotfiles

  # Test base profile install (lite mode)
  test-base:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
      target: test-base

  # Test security profile configs and hardening
  test-security:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
      target: test-security

  # Full integration test (all profiles, lite mode)
  test-full:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.test
      target: test-full

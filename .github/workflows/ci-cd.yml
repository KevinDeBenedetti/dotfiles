---
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-shell.yml@main
    with:
      run-shellcheck: true
      run-bats: true
      run-docker: true
      docker-targets: '["test-bats","test-init","test-dotfiles","test-base","test-security","test-full"]'

  security:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    permissions:
      contents: read
      actions: read
      security-events: write
      pull-requests: read
    with:
      run-node-audit: false # no Node.js project
      run-codeql: false     # shell scripts are not supported by CodeQL
    secrets: inherit

  # ── Dispatch docs rebuild ──────────────────────────────────────────────────
  dispatch:
    name: Dispatch docs rebuild
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/dispatch-docs.yml@main
    secrets:
      dispatch-token: ${{ secrets.PAGES_DISPATCH_TOKEN }}

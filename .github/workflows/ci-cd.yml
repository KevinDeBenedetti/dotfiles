name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      run-node-audit: false # no Node.js project
      run-codeql: false     # shell scripts are not supported by CodeQL
    secrets: inherit
